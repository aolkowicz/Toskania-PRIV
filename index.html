  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --ink: #1a1a1a;
    --ink2: #444;
    --muted: #888;
    --bg: #faf8f5;
    --card: #ffffff;
    --border: #e8e2d9;
    --terra: #c4622d;
    --terra-light: #f5ede7;
    --booking: #003580;
    --booking-light: #e8eef7;
    --airbnb: #e0224d;
    --airbnb-light: #fde8ed;
    --green: #2d6a4f;
    --green-light: #e8f4ef;
    --gold: #a07830;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: #fff;
    padding: 60px 40px 48px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 40%;
    background: linear-gradient(135deg, transparent 40%, rgba(196,98,45,0.15) 100%);
    pointer-events: none;
  }
  .header-eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--terra);
    margin-bottom: 16px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  header h1 span { color: var(--terra); }
  .header-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
  }
  .header-stats {
    display: flex;
    gap: 32px;
    margin-top: 32px;
    flex-wrap: wrap;
  }
  .stat { text-align: left; }
  .stat-val {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .stat-lbl {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }
